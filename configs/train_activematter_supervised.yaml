defaults:
  - dataset: active_matter
  - model: conv_small

dataset:
  num_frames: 16   # 32 frames loaded per sample (16 ctx used, 16 tgt unused)

model:
  objective: "supervised"
  dims: [16, 32, 64, 128, 128]
  num_res_blocks: [3, 3, 3, 9, 3]

train:
  num_epochs: 30
  batch_size: 4
  report_every: 100
  save_every: 2
  include_labels: true             # ensure physical_params are in the batch
  predict_n_steps: false
  task: "regression"
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 1e-6
  lr: 1e-3
  weight_decay: 0.05
  noise_std: 1.0
  run_name: "supervised-baseline-linear"
  distributed: true

  # Required by the base Trainer/factory but not used for the supervised
  # objective (no VICReg loss path).
  sim_coeff: 2
  std_coeff: 40
  cov_coeff: 2

wandb_project: "physics-jepa"
out_path: "./checkpoints"
cache_path: "./dataset_cache"
