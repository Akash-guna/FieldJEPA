defaults:
  - dataset: active_matter
  - model: conv_small
  - ft: linear

dataset:
  num_frames: 16   # 32 frames loaded per sample (16 context + 16 target)

model:
  objective: "jepa"
  dims: [16, 32, 64, 128, 128]
  num_res_blocks: [3, 3, 3, 9, 3]

train:
  num_epochs: 30
  batch_size: 4
  report_every: 100
  save_every: 2
  include_labels: false
  predict_n_steps: false
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 1e-6
  lr: 1e-3
  weight_decay: 0.05
  noise_std: 1.0
  run_name: "vjepa-ema-temporal"
  distributed: true

  # Masking parameters
  channel_masked: false
  field_masked: true
  inverse_masked: false
  learnable_mask: false
  mask_period: 2

  # V-JEPA hyperparameters
  ema_base_momentum: 0.998   # cosine schedule start
  ema_final_momentum: 1.0    # cosine schedule end
  vjepa_loss: "smooth_l1"    # or "mse"

  # Required by the base get_model_components factory but UNUSED here
  # (the VICReg loss it returns is discarded by VJepaTrainer).
  sim_coeff: 2
  std_coeff: 40
  cov_coeff: 2

ft:
  task: "regression"
  use_attentive_pooling: true
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 0
  lr: 1e-3
  weight_decay: 0.01
  noise_std: 1.0
  run_name: "activematter-vjepa-FT"
  distributed: false

wandb_project: "physics-jepa"
out_path: "./checkpoints"
cache_path: "./dataset_cache"
