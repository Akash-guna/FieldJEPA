# kNN regression evaluator config. No gradient training — we just compute
# (and cache) frozen-encoder embeddings, then fit sklearn KNeighborsRegressor.
# num_epochs / lr / batch_size are kept here only to satisfy the BaseFinetuner
# / Trainer init path (loaders, seeds). They are not used by the kNN loop.
num_epochs: 1
batch_size: 32
report_every: 100
head_type: knn
task: regression
embeddings_dir: "./embeddings"

# kNN hyperparameters. n_neighbors_list runs a sweep and reports the best k.
n_neighbors_list: [1, 3, 5, 10, 20, 50]
knn_weights: "distance"     # "uniform" or "distance"
knn_metric: "minkowski"     # default L2
