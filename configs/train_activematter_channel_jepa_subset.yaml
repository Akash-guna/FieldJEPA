defaults:
  - dataset: active_matter
  - model: conv_small
  - ft: linear

dataset:
  num_frames: 16
  subset_config_path: configs/dataset/subset_configs/subset_a5_z5_20pct.json  # change to desired subset

model:
  objective: "jepa"
  dims: [16, 32, 64, 128, 128]
  num_res_blocks: [3, 3, 3, 9, 3]

train:
  num_epochs: 30
  batch_size: 4 # per-device
  report_every: 100
  save_every: 2
  include_labels: false
  sim_coeff: 2
  std_coeff: 40
  cov_coeff: 2
  predict_n_steps: false
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 1e-6
  lr: 1e-3 # following 1e-3 * global_batch_size/256 rule
  weight_decay: 0.05
  noise_std: 1.0
  channel_masked: false
  field_masked: true
  inverse_target: false
  learnable_mask: false
  mask_period: 2
  run_name: "field-mask-0.5masking-no-z"
  distributed: true

ft:
  task: "regression"
  use_attentive_pooling: true
  lr_scheduler: "cosine"
  lr_scheduler_warmup_epochs: 2
  min_lr: 0
  lr: 1e-3
  weight_decay: 0.01
  noise_std: 1.0
  run_name: "activematter-channel-jepa-FT-subset"
  distributed: false

wandb_project: "physics-jepa"
out_path: "./checkpoints"
cache_path: "./dataset_cache"
